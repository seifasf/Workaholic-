# Render Blueprint — this repo is the backend (repo root).
# If you later convert to a monorepo, set `rootDir` accordingly.
services:
  - type: web
    name: workaholic-api
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
